app-id: org.radare.iaito

runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk

command: iaito
finish-args:
  - --share=ipc
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --allow=devel
  - --env=QT_QPA_PLATFORM=wayland;xcb

cleanup:
  - /share/man
  - /share/zsh

build-options:
  env:
    R2PM_OFFLINE: yes

add-extensions:
# WebUI optional extension
  org.radare.iaito.webui:
    directory: share/iaito/webui
    bundle: true
    autodelete: true
    no-autodownload: true
    locale-subset: false

modules:
  - name: radare2
    buildsystem: autotools
    build-options:
      cflags: -O3
    config-opts:
      - --with-checks-level=0
    # Not working right now, moving it manually at post-install
    # - R2_WWWROOT=/app/share/iaito/webui/www
    post-install:
      - mkdir -p /app/share/iaito/webui
      - mv /app/share/radare2/*.*.*/www /app/share/iaito/webui/
      - ln -s ../../iaito/webui/www /app/share/radare2/*.*.*/
      - install -Dpm644 -t /app/share/iaito/webui/share/metainfo org.radare.iaito.webui.metainfo.xml
      - appstreamcli compose --no-net --prefix=/ --components=org.radare.iaito.webui
        --origin=org.radare.iaito.webui --result-root=/app/share/iaito/webui --data-dir=/app/share/iaito/webui/share/app-info/xmls
        /app/share/iaito/webui
    sources:
      - type: archive
        url: https://github.com/radareorg/radare2/releases/download/6.1.8/radare2-6.1.8.tar.xz
        archive-type: tar-xz
        sha256: 5b5ca179846c571a171a117d0a70e67cf114eecc66370fd030656b4f5bc1919b
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/radare2/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          url-query: |-
            .assets[] | select(.name=="radare2-" + $version + ".tar.xz") | .browser_download_url
      - type: file
        path: extensions/org.radare.iaito.webui.metainfo.xml

  - name: r2ghidra
    buildsystem: autotools
    build-options:
      cflags: -O3
    sources:
      - type: archive
        url: https://github.com/radareorg/r2ghidra/releases/download/6.1.8/r2ghidra-6.1.8.tar.xz
        archive-type: tar-xz
        sha256: 51294a6cee8343e36af88cc7d087fcada239280ee1301acd25971ac836c3ae0d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/r2ghidra/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          url-query: |-
            .assets[] | select(.name=="r2ghidra-" + $version + ".tar.xz") | .browser_download_url

  - name: r2frida
    buildsystem: autotools
    build-options:
      cflags: -O3 -w
    config-opts:
      - --with-precompiled-agent
      - --with-checks-level=0
    make-args:
      - DLCMD=false
    sources:
      - type: git
        url: https://github.com/nowsecure/r2frida.git
        tag: 6.1.8
        commit: 66530e8f1258586cffc6bd8632f05ba593572483
        x-checker-data:
          type: json
          url: https://api.github.com/repos/nowsecure/r2frida/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          tag-query: .tag_name
      - type: file
        url: https://github.com/nowsecure/r2frida/releases/download/6.1.8/_agent.js
        sha256: e32fe0cf27018db1dc127f8c965deae95fb820fa575e59506cb9c7fff5e40e31
        dest: src
        dest-filename: _agent.js
        x-checker-data:
          type: json
          url: https://api.github.com/repos/nowsecure/r2frida/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          url-query: |-
            .assets[] | select(.name=="_agent.js") | .browser_download_url
      - type: file
        url: https://github.com/frida/frida/releases/download/17.15.1/frida-core-devkit-17.15.1-linux-x86_64.tar.xz
        sha256: 155414ab807ec42427460adeef1460b95fc009e517493dfafc86d999a9d7ba15
        only-arches: [x86_64]
        x-checker-data:
          type: json
          url: https://api.github.com/repos/nowsecure/r2frida/releases/latest
          version-query: .body | capture("[Ff]rida +(?<frida_version>[0-9.]+)") |
            .frida_version
          url-data-url: >-
            "https://api.github.com/repos/frida/frida/releases/tags/\($version)"
          url-query: |-
            .assets[] | select(.name=="frida-core-devkit-" + $version + "-linux-x86_64.tar.xz") | .browser_download_url
      - type: file
        url: https://github.com/frida/frida/releases/download/17.15.1/frida-core-devkit-17.15.1-linux-arm64.tar.xz
        sha256: 8ddebc85b34e9023844153665a21c8792be7ab4abfa858d7c992d1e233f5751d
        only-arches: [aarch64]
        x-checker-data:
          type: json
          url: https://api.github.com/repos/nowsecure/r2frida/releases/latest
          version-query: .body | capture("[Ff]rida +(?<frida_version>[0-9.]+)") |
            .frida_version
          url-data-url: >-
            "https://api.github.com/repos/frida/frida/releases/tags/\($version)"
          url-query: |-
            .assets[] | select(.name=="frida-core-devkit-" + $version + "-linux-arm64.tar.xz") | .browser_download_url
      - type: shell # decompress frida-sdk keeping its own version
        commands:
          - FRIDA_DEST=$(echo frida-core-devkit-*.tar.xz | sed -r 's,^.*-([0-9\.]+)-.*$,ext/frida-linux-\1,');
            mkdir -vp "${FRIDA_DEST}" && tar -vxJf frida-core-devkit-*.tar.xz -C "${FRIDA_DEST}"
          - rm -vf frida-core-devkit-*.tar.xz

  - name: r2dec
    buildsystem: meson
    build-options:
      cflags: -O3
    sources:
      - type: git
        url: https://github.com/wargio/r2dec-js.git
        tag: 6.1.6
        commit: 52f8c3e9d447e9a56f4b243173e42b9fac477a0b
        x-checker-data:
          type: json
          url: https://api.github.com/repos/wargio/r2dec-js/releases/latest
          tag-query: .tag_name
          version-query: $tag
          timestamp-query: .published_at
      # r2dec meson subprojects
      - type: git
        url: https://github.com/quickjs-ng/quickjs.git
        tag: v0.8.0
        commit: 482291286b9960c255ff8765d18a618cc87d89a2
        dest: subprojects/libquickjs
      - type: shell
        commands:
          - meson subprojects packagefiles --apply
  - name: r2yara
    buildsystem: autotools
    build-options:
      cflags: -O3
    config-opts:
      - --with-checks-level=0
    sources:
      - type: git
        url: https://github.com/radareorg/r2yara.git
        tag: 1.5.0
        commit: 794795ef33f36e774ce7e38668f0877eb304b49d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/r2yara/releases/latest
          tag-query: .tag_name
          version-query: $tag
          timestamp-query: .published_at
    modules:
      - name: yara
        buildsystem: autotools
        build-options:
          cflags: -O3
        sources:
          - type: git
            url: https://github.com/VirusTotal/yara.git
            tag: v4.5.5
            commit: f44a8958e88daa75d765a52a68876f2286d57a51
            x-checker-data:
              type: json
              url: https://api.github.com/repos/VirusTotal/yara/releases/latest
              tag-query: .tag_name
              version-query: $tag | sub("^v"; "")
              timestamp-query: .published_at
          - type: shell
            commands:
              - ./bootstrap.sh

  - name: r2ai
    buildsystem: simple
    build-commands:
      - make -C src
      - make -C src install
      - make -C decai install
    sources:
      - type: git
        url: https://github.com/radareorg/r2ai.git
        tag: 1.4.0
        commit: f2be5cc3c24d417a7a1dabf2aa1e171f8064b7d7
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/r2ai/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          tag-query: .tag_name

  - name: r2pipe-python
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/00/68/1bd2e0d709f3b0d8e112f143797c92074e8b76ad6c1fb44e05420e085e4e/r2pipe-1.9.8.tar.gz
        sha256: 87ac3a69cd6466e330364bb47995bf49c2a87aadaf6497b9cd7fdd9dcf24c1df
        x-checker-data:
          type: pypi
          name: r2pipe

  - name: iaito
    buildsystem: qmake
    config-opts:
      - -config
      - release
      - IAITO_ENABLE_DEBUGGER=false
    subdir: src
    sources:
      - type: git
        url: https://github.com/radareorg/iaito.git
        tag: 6.1.8
        commit: fb1b22c35f0b4aabd409becd2d5502179e5b85e4
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/iaito/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          tag-query: .tag_name
          is-main-source: true

  - name: iaito-translations
    buildsystem: simple
    build-commands:
      - make install PREFIX=/app
    sources:
      - type: git
        url: https://github.com/radareorg/iaito-translations.git
        tag: '20221114'
        commit: e66b3a962a7fc7dfd730764180011ecffbb206bf
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/iaito-translations/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          tag-query: .tag_name
