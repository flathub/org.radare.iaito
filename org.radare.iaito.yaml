app-id: org.radare.iaito

runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk

command: iaito
finish-args:
  - --share=ipc
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --allow=devel
  - --env=QT_QPA_PLATFORM=wayland;xcb

cleanup:
  - /share/man
  - /share/zsh

build-options:
  env:
    R2PM_OFFLINE: yes

add-extensions:
# WebUI optional extension
  org.radare.iaito.webui:
    directory: share/iaito/webui
    bundle: true
    autodelete: true
    no-autodownload: true
    locale-subset: false

modules:
  - name: radare2
    buildsystem: autotools
    build-options:
      cflags: -O3
    config-opts:
      - --with-checks-level=0
    # Not working right now, moving it manually at post-install
    # - R2_WWWROOT=/app/share/iaito/webui/www
    post-install:
      - mkdir -p /app/share/iaito/webui
      - mv /app/share/radare2/*.*.*/www /app/share/iaito/webui/
      - ln -s ../../iaito/webui/www /app/share/radare2/*.*.*/
      - install -Dpm644 -t /app/share/iaito/webui/share/metainfo org.radare.iaito.webui.metainfo.xml
      - appstreamcli compose --no-net --prefix=/ --components=org.radare.iaito.webui
        --origin=org.radare.iaito.webui --result-root=/app/share/iaito/webui --data-dir=/app/share/iaito/webui/share/app-info/xmls
        /app/share/iaito/webui
    sources:
      - type: archive
        url: https://github.com/radareorg/radare2/releases/download/6.1.6/radare2-6.1.6.tar.xz
        archive-type: tar-xz
        sha256: a129e21653be203e26552ba8f59925296361a50d2929e7f12718d3e5451ce4e4
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/radare2/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          url-query: |-
            .assets[] | select(.name=="radare2-" + $version + ".tar.xz") | .browser_download_url
      - type: file
        path: extensions/org.radare.iaito.webui.metainfo.xml

  - name: r2ghidra
    buildsystem: autotools
    build-options:
      cflags: -O3
    sources:
      - type: archive
        url: https://github.com/radareorg/r2ghidra/releases/download/6.1.6/r2ghidra-6.1.6.tar.xz
        archive-type: tar-xz
        sha256: 1067c9c7207a1984ab9af1279b45443352251c76d925baebea3223bafa33393c
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/r2ghidra/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          url-query: |-
            .assets[] | select(.name=="r2ghidra-" + $version + ".tar.xz") | .browser_download_url

  - name: r2frida
    buildsystem: autotools
    build-options:
      cflags: -O3 -w
    config-opts:
      - --with-precompiled-agent
      - --with-checks-level=0
    make-args:
      - DLCMD=false
    sources:
      - type: git
        url: https://github.com/nowsecure/r2frida.git
        tag: 6.1.6
        commit: f6bba4d4c02f103f651781525f68c84085d5caaa
        x-checker-data:
          type: json
          url: https://api.github.com/repos/nowsecure/r2frida/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          tag-query: .tag_name
      - type: file
        url: https://github.com/nowsecure/r2frida/releases/download/6.1.6/_agent.js
        sha256: 42fb6db72b33ccdc3d01afb416df707cab46eb8b089fd7d515f9172bee4f9809
        dest: src
        dest-filename: _agent.js
        x-checker-data:
          type: json
          url: https://api.github.com/repos/nowsecure/r2frida/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          url-query: |-
            .assets[] | select(.name=="_agent.js") | .browser_download_url
      - type: file
        url: https://github.com/frida/frida/releases/download/17.9.8/frida-core-devkit-17.9.8-linux-x86_64.tar.xz
        sha256: 54ad85b93d2c715060d960ac3df700a4aef95ecc403addd44f8ee7f98cd7d2f8
        only-arches: [x86_64]
        x-checker-data:
          type: json
          url: https://api.github.com/repos/nowsecure/r2frida/releases/latest
          version-query: .body | capture("[Ff]rida +(?<frida_version>[0-9.]+)") |
            .frida_version
          url-data-url: >-
            "https://api.github.com/repos/frida/frida/releases/tags/\($version)"
          url-query: |-
            .assets[] | select(.name=="frida-core-devkit-" + $version + "-linux-x86_64.tar.xz") | .browser_download_url
      - type: file
        url: https://github.com/frida/frida/releases/download/17.9.8/frida-core-devkit-17.9.8-linux-arm64.tar.xz
        sha256: 46903449df3dc68f8f8b2bca05240dbaf36c8fc31ac896995c63f0bf21db4b69
        only-arches: [aarch64]
        x-checker-data:
          type: json
          url: https://api.github.com/repos/nowsecure/r2frida/releases/latest
          version-query: .body | capture("[Ff]rida +(?<frida_version>[0-9.]+)") |
            .frida_version
          url-data-url: >-
            "https://api.github.com/repos/frida/frida/releases/tags/\($version)"
          url-query: |-
            .assets[] | select(.name=="frida-core-devkit-" + $version + "-linux-arm64.tar.xz") | .browser_download_url
      - type: shell # decompress frida-sdk keeping its own version
        commands:
          - FRIDA_DEST=$(echo frida-core-devkit-*.tar.xz | sed -r 's,^.*-([0-9\.]+)-.*$,ext/frida-linux-\1,');
            mkdir -vp "${FRIDA_DEST}" && tar -vxJf frida-core-devkit-*.tar.xz -C "${FRIDA_DEST}"
          - rm -vf frida-core-devkit-*.tar.xz

  - name: r2dec
    buildsystem: meson
    build-options:
      cflags: -O3
    sources:
      - type: archive
        url: https://github.com/wargio/r2dec-js/releases/download/6.0.7/r2dec-6.0.7-src-with-deps.zip
        archive-type: zip
        sha256: 198f01c778832b969566d9604d98cce2cb38f1dba6a8a473a3991db8f6c7a65a
        strip-components: 0
        x-checker-data:
          type: json
          url: https://api.github.com/repos/wargio/r2dec-js/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          url-query: |-
            .assets[] | select(.name | endswith("-src-with-deps.zip")) | .browser_download_url

  - name: r2yara
    buildsystem: autotools
    build-options:
      cflags: -O3
    config-opts:
      - --with-checks-level=0
    sources:
      - type: git
        url: https://github.com/radareorg/r2yara.git
        tag: 1.4.8
        commit: 76235a4ed81c2b26ad2aa4b923b20a12cb329915
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/r2yara/releases/latest
          tag-query: .tag_name
          version-query: $tag
          timestamp-query: .published_at
    modules:
      - name: yara
        buildsystem: autotools
        build-options:
          cflags: -O3
        sources:
          - type: git
            url: https://github.com/VirusTotal/yara.git
            tag: v4.5.5
            commit: f44a8958e88daa75d765a52a68876f2286d57a51
            x-checker-data:
              type: json
              url: https://api.github.com/repos/VirusTotal/yara/releases/latest
              tag-query: .tag_name
              version-query: $tag | sub("^v"; "")
              timestamp-query: .published_at
          - type: shell
            commands:
              - ./bootstrap.sh

  - name: r2ai
    buildsystem: simple
    build-commands:
      - make -C src
      - make -C src install
      - make -C decai install
    sources:
      - type: git
        url: https://github.com/radareorg/r2ai.git
        tag: 1.4.0
        commit: f2be5cc3c24d417a7a1dabf2aa1e171f8064b7d7
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/r2ai/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          tag-query: .tag_name

  - name: r2pipe-python
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/00/68/1bd2e0d709f3b0d8e112f143797c92074e8b76ad6c1fb44e05420e085e4e/r2pipe-1.9.8.tar.gz
        sha256: 87ac3a69cd6466e330364bb47995bf49c2a87aadaf6497b9cd7fdd9dcf24c1df
        x-checker-data:
          type: pypi
          name: r2pipe

  - name: iaito
    buildsystem: qmake
    config-opts:
      - -config
      - release
      - IAITO_ENABLE_DEBUGGER=false
    subdir: src
    sources:
      - type: git
        url: https://github.com/radareorg/iaito.git
        tag: 6.1.6
        commit: 2d3ab3cd467a390ed666cfbe96261de581e1b115
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/iaito/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          tag-query: .tag_name
          is-main-source: true

  - name: iaito-translations
    buildsystem: simple
    build-commands:
      - make install PREFIX=/app
    sources:
      - type: git
        url: https://github.com/radareorg/iaito-translations.git
        tag: '20221114'
        commit: e66b3a962a7fc7dfd730764180011ecffbb206bf
        x-checker-data:
          type: json
          url: https://api.github.com/repos/radareorg/iaito-translations/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name
          tag-query: .tag_name
